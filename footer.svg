<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 150" width="900" height="150">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%"  stop-color="#0a0818"/>
      <stop offset="50%" stop-color="#130f35"/>
      <stop offset="100%" stop-color="#0a0818"/>
    </linearGradient>
    <linearGradient id="bar" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%"   stop-color="#a78bfa" stop-opacity="0"/>
      <stop offset="20%"  stop-color="#c084fc"/>
      <stop offset="45%"  stop-color="#f0abfc"/>
      <stop offset="70%"  stop-color="#93c5fd"/>
      <stop offset="100%" stop-color="#a78bfa" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="textG" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%">
        <animate attributeName="stop-color" values="#e9d5ff;#fce7f3;#dbeafe;#e9d5ff" dur="7s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%">
        <animate attributeName="stop-color" values="#fce7f3;#dbeafe;#e9d5ff;#fce7f3" dur="7s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
    <filter id="orb"><feGaussianBlur stdDeviation="28"/></filter>
    <filter id="soft">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="900" height="150" fill="url(#bg)"/>

  <!-- Wave shape -->
  <path d="M0,45 Q225,8 450,45 Q675,82 900,45 L900,150 L0,150 Z"
        fill="#100c30" opacity="0.65"/>
  <path d="M0,65 Q225,28 450,65 Q675,102 900,65 L900,150 L0,150 Z"
        fill="#0c0825" opacity="0.45"/>

  <!-- Orb -->
  <ellipse cx="450" cy="115" rx="210" ry="55" fill="#7c3aed" opacity="0.07" filter="url(#orb)">
    <animate attributeName="rx" values="210;240;210" dur="7s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Top bar -->
  <rect x="0" y="0" width="900" height="3" fill="url(#bar)">
    <animate attributeName="opacity" values="1;0.4;1" dur="4s" repeatCount="indefinite"/>
  </rect>

  <!-- Stars -->
  <circle cx="80"  cy="118" r="1.0" fill="#ddd6fe" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="3.2s" repeatCount="indefinite"/></circle>
  <circle cx="820" cy="114" r="1.0" fill="#fbcfe8" opacity="0.4"><animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.7s" repeatCount="indefinite"/></circle>
  <circle cx="450" cy="130" r="1.2" fill="#bae6fd" opacity="0.3"><animate attributeName="opacity" values="0.3;0.1;0.3" dur="4.4s" repeatCount="indefinite"/></circle>

  <!-- Particle -->
  <circle r="1.6" fill="#c4b5fd" opacity="0">
    <animateMotion dur="12s" repeatCount="indefinite"
      path="M 0,75 C 300,55 600,85 900,65"/>
    <animate attributeName="opacity" values="0;0.45;0.18;0.40;0" dur="12s" repeatCount="indefinite"/>
  </circle>

  <!-- Main text -->
  <text x="450" y="72" text-anchor="middle"
        font-family="Georgia, serif" font-size="20" font-weight="bold"
        letter-spacing="1.5" fill="url(#textG)" filter="url(#soft)">
    Made with ♡ by Syed Hassan Tayyab
  </text>

  <!-- Sub text -->
  <text x="450" y="98" text-anchor="middle"
        font-family="Trebuchet MS, Arial, sans-serif"
        font-size="12" letter-spacing="2" fill="#8b7aa8" opacity="0.80">
    24PWAI0032  ·  BS Artificial Intelligence  ·  UET Peshawar  ·  Spring 2025
  </text>

  <!-- CTA -->
  <text x="450" y="122" text-anchor="middle"
        font-family="Arial, sans-serif" font-size="12" fill="#c4b5fd" opacity="0.55">
    ✦  Star this repo if it helped you  ✦
    <animate attributeName="opacity" values="0.55;0.20;0.55" dur="3.5s" repeatCount="indefinite"/>
  </text>

  <!-- Bottom bar -->
  <rect x="0" y="147" width="900" height="3" fill="url(#bar)">
    <animate attributeName="opacity" values="1;0.4;1" dur="4s" repeatCount="indefinite" begin="2s"/>
  </rect>
</svg>